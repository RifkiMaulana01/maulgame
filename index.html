<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2D Mario Ultra Running Adventure</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background: #111;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #5c94fc;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 20;
            transition: opacity 0.2s ease;
        }
        .hide {
            display: none !important;
        }
        h1 {
            font-size: 2.8rem;
            color: #ffcc00;
            margin-bottom: 15px;
            text-shadow: 3px 3px #cc0000, 5px 5px #000;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
        }
        p {
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: #fff;
            text-shadow: 1px 1px 3px #000;
            text-align: center;
            padding: 0 10px;
        }
        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(to bottom, #ff3333, #cc0000);
            border: 3px solid #fff;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px 0 #660000, 0 8px 15px rgba(0,0,0,0.4);
            text-transform: uppercase;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #660000;
        }
        #touchHint {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
            z-index: 5;
        }
        @media (pointer: fine) {
            #touchHint { display: none; }
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="touchHint">Ketuk layar untuk melompat</div>

    <div id="startScreen" class="overlay">
        <h1>MARIO ULTRA RUNNER</h1>
        <p>Tekan SPASI / PANAH ATAS atau Ketuk Layar untuk Lompat</p>
        <button id="startBtn">MULAI BERLARI</button>
    </div>

    <div id="gameOverScreen" class="overlay hide">
        <h1 style="color: #ff3333; text-shadow: 3px 3px #660000, 5px 5px #000;">Game Over</h1>
        <p id="finalScore" style="font-size: 1.4rem; font-weight: bold; color: #ffcc00; margin-bottom: 5px;">Skor: 0</p>
        <p id="highScoreText" style="font-size: 1.1rem; color: #fff; margin-bottom: 20px;">REKOR TERTINGGI: 0</p>
        <button id="restartBtn">COBA LAGI</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const finalScoreText = document.getElementById('finalScore');
    const highScoreText = document.getElementById('highScoreText');

    const bgImage = new Image();
    let bgLoaded = false;
    bgImage.onload = function() { bgLoaded = true; };
    bgImage.src = 'assets/bacround.jpg';

    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playSound(type) {
        if (!audioCtx) return;
        try {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            let now = audioCtx.currentTime;

            if (type === 'jump') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'coin') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(980, now);
                osc.frequency.setValueAtTime(1318, now + 0.08);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.25);
                osc.start(now); osc.stop(now + 0.25);
            } else if (type === 'hit') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.linearRampToValueAtTime(60, now + 0.2);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'gameover') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.setValueAtTime(350, now + 0.1);
                osc.frequency.setValueAtTime(300, now + 0.2);
                osc.frequency.linearRampToValueAtTime(100, now + 0.5);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            }
        } catch(e) { console.log(e); }
    }

    let isPlaying = false;
    let score = 0;
    let highScore = localStorage.getItem('mario_high_score') ? parseInt(localStorage.getItem('mario_high_score')) : 0;
    let lives = 3;
    let animationFrameId;
    
    let gameSpeed = 2.3;       
    let maxSpeed = 8.5;        
    let speedIncrement = 0.02; 
    
    let obstacleTimer = 0;
    let coinTimer = 0;
    let spawnInterval = 140;   
    let groundY = 0;
    let bgX = 0; 

    let player;
    let obstacles = [];
    let coins = [];
    let particles = [];

    function resizeCanvas() {
        const container = document.getElementById('gameContainer');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        
        // TINGGIIN DIKIT LAGI: Diubah ke 93 agar pas menutup garis hitam di screenshot kamu
        groundY = canvas.height - 93; 
        if (player) player.groundCheck();
    }
    window.addEventListener('resize', resizeCanvas);

    class Player {
        constructor() {
            this.width = 30;
            this.height = 45;
            this.x = 80;
            this.y = groundY - this.height;
            this.velocityY = 0;
            // DISETTING ULANG: Gravitasi dan gaya lompat dikurangi agar lompatannya lebih melayang santai, tidak jatuh terlalu cepat
            this.gravity = 0.38;       
            this.jumpForce = -9.2;    
            this.isGrounded = true;
            this.runCycle = 0;
            this.invincibleFrames = 0; 
        }

        groundCheck() {
            this.y = groundY - this.height;
        }

        jump() {
            if (this.isGrounded) {
                this.velocityY = this.jumpForce;
                this.isGrounded = false;
                playSound('jump');
            }
        }

        update() {
            this.velocityY += this.gravity;
            this.y += this.velocityY;

            if (this.y >= groundY - this.height) {
                this.y = groundY - this.height;
                this.velocityY = 0;
                this.isGrounded = true;
            }

            if (this.isGrounded) {
                this.runCycle += 0.10 + (gameSpeed * 0.01); 
            }

            if (this.invincibleFrames > 0) {
                this.invincibleFrames--;
            }
        }

        draw() {
            if (this.invincibleFrames > 0 && Math.floor(this.invincibleFrames / 4) % 2 === 0) {
                return;
            }

            ctx.save();
            let isMoving = Math.sin(this.runCycle) > 0;

            ctx.fillStyle = '#0022cc';
            ctx.fillRect(this.x + 4, this.y + 28, 22, 12);
            ctx.fillStyle = '#993300'; 
            ctx.fillRect(this.x + (isMoving ? 2 : 5), this.y + 38, 8, 7);
            ctx.fillRect(this.x + (isMoving ? 18 : 15), this.y + 38, 8, 7);

            ctx.fillStyle = '#ff0000';
            ctx.fillRect(this.x + 2, this.y + 14, 26, 15);
            
            ctx.fillStyle = '#0022cc';
            ctx.fillRect(this.x + 6, this.y + 14, 5, 14);
            ctx.fillRect(this.x + 19, this.y + 14, 5, 14);

            ctx.fillStyle = '#ff0000';
            if (this.isGrounded) {
                ctx.fillRect(this.x - 2, this.y + 16, 5, 10); 
            } else {
                ctx.fillRect(this.x + 24, this.y + 2, 5, 12); 
            }

            ctx.fillStyle = '#ffcc99';
            ctx.fillRect(this.x + 5, this.y + 2, 20, 13);
            ctx.fillStyle = '#441100';
            ctx.fillRect(this.x + 17, this.y + 9, 8, 3); 
            ctx.fillRect(this.x + 18, this.y + 4, 3, 4); 

            ctx.fillStyle = '#ff0000';
            ctx.fillRect(this.x + 3, this.y - 2, 21, 5);  
            ctx.fillRect(this.x + 8, this.y + 1, 17, 2);  
            
            ctx.restore();
        }
    }

    class Obstacle {
        constructor() {
            this.type = Math.floor(Math.random() * 3);
            this.width = 35;
            
            if (this.type === 0) {
                this.height = Math.random() * 15 + 25; 
                this.y = groundY - this.height;
            } else if (this.type === 1) {
                this.height = Math.random() * 20 + 45; 
                this.y = groundY - this.height;
            } else {
                this.height = 30;
                this.y = groundY - this.height;
            }
            this.x = canvas.width;
        }

        update() { this.x -= gameSpeed; }

        draw() {
            ctx.save();
            if (this.type === 0 || this.type === 1) {
                ctx.fillStyle = '#00a800';
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.fillRect(this.x + 3, this.y, this.width - 6, this.height);
                ctx.strokeRect(this.x + 3, this.y, this.width - 6, this.height);
                
                ctx.fillStyle = '#44d844';
                ctx.fillRect(this.x, this.y, this.width, 14);
                ctx.strokeRect(this.x, this.y, this.width, 14);
            } else {
                ctx.fillStyle = '#cc6633';
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.strokeRect(this.x, this.y, this.width, this.height);
                
                ctx.beginPath();
                ctx.moveTo(this.x, this.y + 15); ctx.lineTo(this.x + this.width, this.y + 15);
                ctx.moveTo(this.x + 17, this.y); ctx.lineTo(this.x + 17, this.y + 15);
                ctx.stroke();

                ctx.fillStyle = '#aaa';
                for (let d = 0; d < this.width; d += 10) {
                    ctx.beginPath();
                    ctx.moveTo(this.x + d, this.y);
                    ctx.lineTo(this.x + d + 5, this.y - 10);
                    ctx.lineTo(this.x + d + 10, this.y);
                    ctx.fill();
                    ctx.stroke();
                }
            }
            ctx.restore();
        }
    }

    class Coin {
        constructor() {
            this.width = 16;
            this.height = 22;
            this.x = canvas.width;
            this.y = groundY - (Math.random() * 70 + 40);
            this.animFrame = Math.random() * 10;
        }
        update() {
            this.x -= gameSpeed;
            this.animFrame += 0.15;
        }
        draw() {
            ctx.save();
            let scaleX = Math.abs(Math.sin(this.animFrame));
            ctx.translate(this.x + this.width/2, this.y + this.height/2);
            ctx.scale(scaleX, 1);
            
            ctx.fillStyle = '#ffcc00';
            ctx.strokeStyle = '#996600';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.ellipse(0, 0, this.width/2, this.height/2, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#996600';
            ctx.fillRect(-2, -6, 4, 12);
            ctx.restore();
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.size = Math.random() * 4 + 2;
            this.speedX = (Math.random() - 0.5) * 7;
            this.speedY = (Math.random() - 0.5) * 7;
            this.color = color;
            this.alpha = 1;
        }
        update() { this.x += this.speedX; this.y += this.speedY; this.alpha -= 0.03; }
        draw() {
            ctx.save(); ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, this.size, this.size);
            ctx.restore();
        }
    }

    window.addEventListener('keydown', (e) => {
        if ((e.key === ' ' || e.key === 'ArrowUp') && isPlaying) {
            e.preventDefault(); player.jump();
        }
    });
    window.addEventListener('touchstart', (e) => {
        if (isPlaying && e.target.tagName !== 'BUTTON') player.jump();
    }, { passive: true });
    canvas.addEventListener('mousedown', () => { if (isPlaying) player.jump(); });

    function checkCollision(p, o) {
        return p.x + 5 < o.x + o.width &&
               p.x + p.width - 5 > o.x &&
               p.y < o.y + o.height &&
               p.y + p.height > o.y;
    }

    function explode(x, y, color) {
        for (let i = 0; i < 15; i++) particles.push(new Particle(x, y, color));
    }

    function gameLoop() {
        if (!isPlaying) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (bgLoaded) {
            bgX -= gameSpeed * 0.4; 
            if (bgX <= -canvas.width) bgX = 0;
            ctx.drawImage(bgImage, bgX, 0, canvas.width, canvas.height);
            ctx.drawImage(bgImage, bgX + canvas.width, 0, canvas.width, canvas.height);
        } else {
            ctx.fillStyle = '#5c94fc'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        ctx.fillStyle = '#cc6633'; ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
        ctx.fillStyle = '#994411'; 
        for (let i = 0; i < canvas.width; i += 20) {
            if ((i / 20) % 2 === 0) {
                ctx.fillRect(i, groundY + 10, 20, 15); ctx.fillRect(i, groundY + 30, 20, 15);
            } else {
                ctx.fillRect(i, groundY, 20, 10); ctx.fillRect(i, groundY + 20, 20, 10);
            }
        }
        ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(canvas.width, groundY); ctx.stroke();

        spawnInterval = Math.max(55, 140 - Math.floor(score * 1.8));

        player.update();
        player.draw();

        obstacleTimer++;
        if (obstacleTimer > Math.random() * 30 + spawnInterval) {
            obstacles.push(new Obstacle());
            obstacleTimer = 0;
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].update();
            obstacles[i].draw();

            if (player.invincibleFrames === 0 && checkCollision(player, obstacles[i])) {
                explode(player.x + player.width/2, player.y + player.height/2, '#ff3333');
                playSound('hit');
                lives--;
                
                if (lives <= 0) {
                    endGame();
                    return;
                } else {
                    player.invincibleFrames = 90; 
                    obstacles.splice(i, 1);
                    continue;
                }
            }

            if (obstacles[i].x + obstacles[i].width < 0) {
                obstacles.splice(i, 1);
                score++; 
                if (gameSpeed < maxSpeed) gameSpeed += speedIncrement;
            }
        }

        coinTimer++;
        if (coinTimer > Math.random() * 60 + 80) {
            coins.push(new Coin());
            coinTimer = 0;
        }

        for (let i = coins.length - 1; i >= 0; i--) {
            coins[i].update();
            coins[i].draw();

            if (checkCollision(player, coins[i])) {
                explode(coins[i].x + coins[i].width/2, coins[i].y + coins[i].height/2, '#ffea00');
                playSound('coin');
                score += 1; 
                coins.splice(i, 1);
                continue;
            }

            if (coins[i].x + coins[i].width < 0) coins.splice(i, 1);
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].alpha <= 0) particles.splice(i, 1);
        }

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 22px "Courier New", Courier, monospace';
        ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
        
        ctx.strokeText(`SKOR: ${score}`, 20, 35); ctx.fillText(`SKOR: ${score}`, 20, 35);
        
        let heartString = '❤️'.repeat(lives);
        ctx.strokeText(`NYAWA: ${heartString}`, 20, 70); ctx.fillText(`NYAWA: ${heartString}`, 20, 70);
        
        let speedDisplay = Math.floor(gameSpeed * 10 - 23);
        ctx.fillStyle = '#ffcc00';
        ctx.strokeText(`LAJU: +${speedDisplay}%`, canvas.width - 170, 35);
        ctx.fillText(`LAJU: +${speedDisplay}%`, canvas.width - 170, 35);

        animationFrameId = requestAnimationFrame(gameLoop);
    }

    function startGame(e) {
        if (e) e.stopPropagation();
        initAudio();
        
        resizeCanvas();
        player = new Player();
        obstacles = [];
        coins = [];
        particles = [];
        score = 0;
        lives = 3; 
        gameSpeed = 2.3; 
        obstacleTimer = 0;
        coinTimer = 0;
        isPlaying = true;
        
        startScreen.classList.add('hide');
        gameOverScreen.classList.add('hide');
        
        gameLoop();
    }

    function endGame() {
        isPlaying = false;
        cancelAnimationFrame(animationFrameId);
        playSound('gameover');

        if (score > highScore) {
            highScore = score;
            localStorage.setItem('mario_high_score', highScore);
        }

        finalScoreText.innerText = `SKOR AKHIR: ${score}`;
        highScoreText.innerText = `REKOR TERTINGGI: ${highScore}`;
        gameOverScreen.classList.remove('hide');
    }

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);

    resizeCanvas();
</script>
</body>
</html>
